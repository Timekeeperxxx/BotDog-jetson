<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>BotDog 自动跟踪行为仿真</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0f1a;
    color: #cdd;
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }
  h1 {
    font-size: 18px;
    font-weight: 700;
    color: #eef;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .subtitle {
    font-size: 12px;
    color: #567;
    margin-bottom: 20px;
  }
  .layout {
    display: flex;
    gap: 16px;
    align-items: flex-start;
    flex-wrap: wrap;
    justify-content: center;
    width: 100%;
    max-width: 1200px;
  }

  /* ── 左：摄像头视角 ── */
  .cam-section {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .section-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #7a9;
    font-weight: 600;
  }
  #camCanvas {
    border: 1px solid #1e3a5a;
    border-radius: 6px;
    cursor: crosshair;
    display: block;
  }
  .cam-hint {
    font-size: 10px;
    color: #456;
    text-align: center;
  }

  /* ── 中：俯视轨迹 ── */
  #topCanvas {
    border: 1px solid #1e3a5a;
    border-radius: 6px;
    display: block;
  }

  /* ── 右：控制面板 ── */
  .ctrl-panel {
    width: 220px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .card {
    background: rgba(10,25,45,0.85);
    border: 1px solid #1e3a5a;
    border-radius: 8px;
    padding: 12px;
  }
  .card-title {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #7a9;
    margin-bottom: 8px;
    font-weight: 600;
  }

  /* 当前命令显示 */
  #cmdDisplay {
    font-size: 28px;
    font-weight: 900;
    text-align: center;
    padding: 14px 0;
    border-radius: 6px;
    letter-spacing: 2px;
    transition: all 0.15s;
  }
  .cmd-stop    { background: #1a2a3a; color: #567; }
  .cmd-left    { background: #0a2a4a; color: #4af; }
  .cmd-right   { background: #0a2a4a; color: #4af; }
  .cmd-forward { background: #0a3a1a; color: #4d8; }

  .arrow-row {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-top: 6px;
  }
  .arrow {
    width: 40px; height: 40px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 6px;
    font-size: 20px;
    border: 1px solid #1e3a5a;
    background: #0a1a2a;
    transition: all 0.15s;
    opacity: 0.3;
  }
  .arrow.active { opacity: 1; border-color: #2bd; background: #0a2a3a; }

  /* 数据行 */
  .data-row {
    display: flex; justify-content: space-between;
    font-size: 11px;
    padding: 3px 0;
    border-bottom: 1px solid #1e3a5a33;
  }
  .data-row:last-child { border-bottom: none; }
  .data-label { color: #7a9; }
  .data-value { color: #cdd; font-weight: 600; font-family: monospace; }

  /* 状态机 */
  .states {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  .state-item {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px;
    padding: 4px 6px;
    border-radius: 4px;
    opacity: 0.4;
    transition: all 0.2s;
  }
  .state-item.active {
    opacity: 1;
    background: rgba(43, 221, 200, 0.08);
    border: 1px solid #2bd5;
  }
  .state-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
  }

  /* 控制按钮 */
  .btn {
    padding: 7px 14px;
    border-radius: 5px;
    border: none;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    width: 100%;
    margin-top: 4px;
    letter-spacing: 0.5px;
  }
  .btn-primary { background: #1a4a6a; color: #adf; }
  .btn-primary:hover { background: #1a5a8a; }
  .btn-danger  { background: #4a1a1a; color: #faa; }
  .btn-danger:hover { background: #6a1a1a; }
  .btn-success { background: #1a4a2a; color: #afa; }
  .btn-success:hover { background: #1a5a3a; }

  /* 时间轴 */
  #timeline {
    display: flex;
    gap: 3px;
    flex-wrap: wrap;
    margin-top: 4px;
  }
  .timeline-dot {
    width: 10px; height: 10px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  /* 日志 */
  #logBox {
    font-size: 10px;
    font-family: monospace;
    max-height: 100px;
    overflow-y: auto;
    color: #567;
    line-height: 1.6;
  }
  #logBox .log-new { color: #7a9; }

  /* 速度滑块 */
  input[type=range] {
    width: 100%;
    accent-color: #2bd;
  }
  label { font-size: 10px; color: #7a9; }
</style>
</head>
<body>

<h1>🐕 BotDog 自动跟踪行为仿真</h1>
<p class="subtitle">模拟陌生人被检测到后，机器狗如何根据目标位置生成移动命令</p>

<div class="layout">

  <!-- 左：摄像头视角 -->
  <div class="cam-section">
    <div class="section-label">📷 摄像头画面（拖动人物）</div>
    <canvas id="camCanvas" width="480" height="320"></canvas>
    <p class="cam-hint">拖动红色人形或使用"自动演示"按钮</p>
  </div>

  <!-- 中：俯视图 -->
  <div class="cam-section">
    <div class="section-label">🗺️ 俯视轨迹（机器狗视角）</div>
    <canvas id="topCanvas" width="320" height="320"></canvas>
  </div>

  <!-- 右：控制面板 -->
  <div class="ctrl-panel">

    <!-- 当前命令 -->
    <div class="card">
      <div class="card-title">当前控制命令</div>
      <div id="cmdDisplay" class="cmd-stop">STOP</div>
      <div class="arrow-row">
        <div class="arrow" id="arr-left">◀</div>
        <div style="display:flex;flex-direction:column;gap:4px">
          <div class="arrow" id="arr-fwd">▲</div>
          <div class="arrow" id="arr-stop">●</div>
        </div>
        <div class="arrow" id="arr-right">▶</div>
      </div>
    </div>

    <!-- 决策参数 -->
    <div class="card">
      <div class="card-title">决策引擎数据</div>
      <div class="data-row"><span class="data-label">水平偏差</span><span class="data-value" id="dErrX">0 px</span></div>
      <div class="data-row"><span class="data-label">死区</span><span class="data-value">±80 px</span></div>
      <div class="data-row"><span class="data-label">目标面积比</span><span class="data-value" id="dArea">0.00</span></div>
      <div class="data-row"><span class="data-label">前进阈值</span><span class="data-value">&lt; 0.15</span></div>
      <div class="data-row"><span class="data-label">锚点 Y</span><span class="data-value" id="dAnchorY">0 px</span></div>
      <div class="data-row"><span class="data-label">防近距前冲</span><span class="data-value">&gt; 80%</span></div>
      <div class="data-row"><span class="data-label">防抖帧</span><span class="data-value" id="dDebounce">0/3</span></div>
    </div>

    <!-- 状态机 -->
    <div class="card">
      <div class="card-title">跟踪状态机</div>
      <div class="states">
        <div class="state-item" id="st-IDLE"><div class="state-dot" style="background:#667"></div>IDLE 待机</div>
        <div class="state-item" id="st-DETECTING"><div class="state-dot" style="background:#fa0"></div>DETECTING 侦测中</div>
        <div class="state-item" id="st-LOCKED"><div class="state-dot" style="background:#e44"></div>TARGET_LOCKED 目标锁定</div>
        <div class="state-item" id="st-FOLLOWING"><div class="state-dot" style="background:#2bd"></div>FOLLOWING 跟踪中 ●</div>
        <div class="state-item" id="st-LOST"><div class="state-dot" style="background:#e88"></div>LOST_SHORT 短时丢失</div>
      </div>
    </div>

    <!-- 演示控制 -->
    <div class="card">
      <div class="card-title">演示控制</div>
      <label>演示速度</label>
      <input type="range" id="speedSlider" min="0.3" max="3" step="0.1" value="1">
      <button class="btn btn-success" onclick="startDemo()">▷ 自动演示</button>
      <button class="btn btn-danger"  onclick="stopDemo()">■ 停止演示</button>
      <button class="btn btn-primary" onclick="resetSim()">↺ 重置</button>
    </div>

    <!-- 命令时间轴 -->
    <div class="card">
      <div class="card-title">命令历史</div>
      <div id="timeline"></div>
    </div>

    <!-- 日志 -->
    <div class="card">
      <div class="card-title">决策日志</div>
      <div id="logBox"></div>
    </div>

  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
//  决策引擎（对齐 follow_decision_engine.py）
// ═══════════════════════════════════════════════════════════════
const ENG = {
  YAW_DEADBAND: 80,       // px
  FORWARD_AREA: 0.15,     // 面积比阈值
  ANCHOR_Y_STOP: 0.80,    // 纵向保护
  DEBOUNCE_FRAMES: 3,
  THROTTLE_MS: 200,

  _lastSentTime: 0,
  _lastSentCmd: null,
  _pendingCmd: null,
  _pendingCount: 0,

  decide(bbox, W, H) {
    const [x1, y1, x2, y2] = bbox;
    const tcx = (x1 + x2) / 2;
    const icx = W / 2;
    const anchorY = y2;
    const errX = tcx - icx;
    const bboxArea = (x2 - x1) * (y2 - y1);
    const areaRatio = bboxArea / (W * H);

    let rawCmd, reason;
    if (Math.abs(errX) > this.YAW_DEADBAND) {
      rawCmd = errX < 0 ? 'left' : 'right';
      reason = `水平偏差 ${errX.toFixed(0)}px（死区±${this.YAW_DEADBAND}px）`;
    } else if (areaRatio < this.FORWARD_AREA) {
      if (anchorY > H * this.ANCHOR_Y_STOP) {
        rawCmd = 'stop';
        reason = `锚点靠近底部（y=${anchorY.toFixed(0)}），禁止前进`;
      } else {
        rawCmd = 'forward';
        reason = `目标居中且较远（area=${areaRatio.toFixed(3)}）`;
      }
    } else {
      rawCmd = 'stop';
      reason = `目标居中且距离合适（area=${areaRatio.toFixed(3)}）`;
    }

    // 防抖
    if (rawCmd === 'left' || rawCmd === 'right') {
      if (rawCmd === this._pendingCmd) this._pendingCount++;
      else { this._pendingCmd = rawCmd; this._pendingCount = 1; }
      if (this._pendingCount < this.DEBOUNCE_FRAMES) {
        return { cmd: rawCmd, send: false, reason: `防抖等待 ${this._pendingCount}/${this.DEBOUNCE_FRAMES}帧`, errX, areaRatio, anchorY, debounce: this._pendingCount };
      }
    } else {
      this._pendingCmd = rawCmd; this._pendingCount = 0;
    }

    // 节流
    const now = performance.now();
    if (rawCmd !== 'stop' && rawCmd === this._lastSentCmd && (now - this._lastSentTime) < this.THROTTLE_MS) {
      return { cmd: rawCmd, send: false, reason: `节流中`, errX, areaRatio, anchorY, debounce: this._pendingCount };
    }

    this._lastSentTime = now;
    this._lastSentCmd = rawCmd;
    return { cmd: rawCmd, send: true, reason, errX, areaRatio, anchorY, debounce: this._pendingCount };
  },

  reset() {
    this._lastSentTime = 0; this._lastSentCmd = null;
    this._pendingCmd = null; this._pendingCount = 0;
  }
};

// ═══════════════════════════════════════════════════════════════
//  画布设置
// ═══════════════════════════════════════════════════════════════
const camCvs = document.getElementById('camCanvas');
const camCtx = camCvs.getContext('2d');
const topCvs = document.getElementById('topCanvas');
const topCtx = topCvs.getContext('2d');
const CW = camCvs.width, CH = camCvs.height;
const TW = topCvs.width, TH = topCvs.height;

// 目标人物（摄像头坐标）
let person = { x: CW / 2, y: CH / 2, w: 60, h: 100 };
let dragging = false;

// 机器狗（俯视坐标）
let dog = { x: TW / 2, y: TH * 0.75, angle: -Math.PI / 2, trail: [] };

// 跟踪状态
let trackState = 'IDLE';
let hitCount = 0;
let lostCount = 0;
let lastCmd = 'stop';
let cmdHistory = [];
let simInterval = null;
let demoPhase = 0;
let demoT = 0;
const STABLE_HITS = 5;
const LOST_FRAMES = 20;

// ═══════════════════════════════════════════════════════════════
//  摄像头画面渲染
// ═══════════════════════════════════════════════════════════════
function drawCam() {
  // 背景
  camCtx.fillStyle = '#0a1520';
  camCtx.fillRect(0, 0, CW, CH);

  // 网格
  camCtx.strokeStyle = '#1e3a5a22';
  camCtx.lineWidth = 1;
  for (let x = 0; x < CW; x += 40) { camCtx.beginPath(); camCtx.moveTo(x,0); camCtx.lineTo(x,CH); camCtx.stroke(); }
  for (let y = 0; y < CH; y += 40) { camCtx.beginPath(); camCtx.moveTo(0,y); camCtx.lineTo(CW,y); camCtx.stroke(); }

  // 中线（死区）
  const cx = CW / 2;
  camCtx.strokeStyle = '#2bd4';
  camCtx.lineWidth = 1;
  camCtx.setLineDash([4, 4]);
  camCtx.beginPath(); camCtx.moveTo(cx, 0); camCtx.lineTo(cx, CH); camCtx.stroke();
  camCtx.setLineDash([]);

  // 死区标线
  camCtx.strokeStyle = '#fa64';
  camCtx.lineWidth = 1;
  camCtx.setLineDash([2, 4]);
  camCtx.beginPath(); camCtx.moveTo(cx - ENG.YAW_DEADBAND, 0); camCtx.lineTo(cx - ENG.YAW_DEADBAND, CH); camCtx.stroke();
  camCtx.beginPath(); camCtx.moveTo(cx + ENG.YAW_DEADBAND, 0); camCtx.lineTo(cx + ENG.YAW_DEADBAND, CH); camCtx.stroke();
  camCtx.setLineDash([]);

  // 纵向保护线
  const stopY = CH * ENG.ANCHOR_Y_STOP;
  camCtx.strokeStyle = '#e554';
  camCtx.lineWidth = 1;
  camCtx.setLineDash([3, 5]);
  camCtx.beginPath(); camCtx.moveTo(0, stopY); camCtx.lineTo(CW, stopY); camCtx.stroke();
  camCtx.setLineDash([]);

  // 标注
  camCtx.fillStyle = '#2bd8';
  camCtx.font = '10px monospace';
  camCtx.fillText('中心线', cx + 4, 14);
  camCtx.fillStyle = '#fa68';
  camCtx.fillText('→ 死区', cx + ENG.YAW_DEADBAND + 4, 28);
  camCtx.fillStyle = '#e558';
  camCtx.fillText('近距保护', 4, stopY - 4);

  // 人物框
  const px = person.x - person.w / 2;
  const py = person.y - person.h;
  const isLocked = (trackState === 'FOLLOWING' || trackState === 'LOCKED');
  const boxColor = isLocked ? '#e44' : trackState === 'DETECTING' ? '#fa0' : '#4af';
  camCtx.strokeStyle = boxColor;
  camCtx.lineWidth = 2;
  camCtx.strokeRect(px, py, person.w, person.h);

  // 锚点（底部中心）
  camCtx.fillStyle = boxColor;
  camCtx.beginPath();
  camCtx.arc(person.x, person.y, 4, 0, Math.PI * 2);
  camCtx.fill();

  // 人物剪影
  drawPersonSilhouette(camCtx, person.x, person.y - person.h / 2, person.h, boxColor);

  // 偏差箭头
  const errX = person.x - cx;
  if (Math.abs(errX) > ENG.YAW_DEADBAND) {
    const dir = errX > 0 ? 1 : -1;
    camCtx.strokeStyle = '#4af';
    camCtx.lineWidth = 2;
    camCtx.beginPath();
    camCtx.moveTo(cx, CH / 2);
    camCtx.lineTo(cx + errX, CH / 2);
    camCtx.stroke();
    // 箭头头
    camCtx.fillStyle = '#4af';
    camCtx.beginPath();
    camCtx.moveTo(cx + errX, CH / 2);
    camCtx.lineTo(cx + errX - dir * 10, CH / 2 - 6);
    camCtx.lineTo(cx + errX - dir * 10, CH / 2 + 6);
    camCtx.fill();
  }

  // 命中计数条
  const progress = Math.min(hitCount / STABLE_HITS, 1);
  camCtx.fillStyle = '#1e2a3a';
  camCtx.fillRect(8, CH - 16, 120, 8);
  camCtx.fillStyle = progress >= 1 ? '#e44' : '#fa0';
  camCtx.fillRect(8, CH - 16, 120 * progress, 8);
  camCtx.fillStyle = '#aaa';
  camCtx.font = '9px monospace';
  camCtx.fillText(`命中 ${hitCount}/${STABLE_HITS}`, 136, CH - 9);
}

function drawPersonSilhouette(ctx, cx, cy, h, color) {
  ctx.fillStyle = color + '66';
  const r = h * 0.12;
  // 头
  ctx.beginPath(); ctx.arc(cx, cy - h * 0.36, r, 0, Math.PI * 2); ctx.fill();
  // 身体
  ctx.fillRect(cx - r * 0.9, cy - h * 0.24, r * 1.8, h * 0.35);
  // 腿
  ctx.fillRect(cx - r * 0.9, cy + h * 0.12, r * 0.75, h * 0.24);
  ctx.fillRect(cx + r * 0.15, cy + h * 0.12, r * 0.75, h * 0.24);
}

// ═══════════════════════════════════════════════════════════════
//  俯视图渲染
// ═══════════════════════════════════════════════════════════════
function drawTop() {
  topCtx.fillStyle = '#080f1a';
  topCtx.fillRect(0, 0, TW, TH);

  // 网格
  topCtx.strokeStyle = '#1e3a5a22';
  topCtx.lineWidth = 1;
  for (let x = 0; x < TW; x += 30) { topCtx.beginPath(); topCtx.moveTo(x,0); topCtx.lineTo(x,TH); topCtx.stroke(); }
  for (let y = 0; y < TH; y += 30) { topCtx.beginPath(); topCtx.moveTo(0,y); topCtx.lineTo(TW,y); topCtx.stroke(); }

  // 轨迹
  if (dog.trail.length > 1) {
    topCtx.strokeStyle = '#2bd4';
    topCtx.lineWidth = 1.5;
    topCtx.setLineDash([3, 5]);
    topCtx.beginPath();
    topCtx.moveTo(dog.trail[0].x, dog.trail[0].y);
    dog.trail.forEach(p => topCtx.lineTo(p.x, p.y));
    topCtx.stroke();
    topCtx.setLineDash([]);
  }

  // 机器狗（四边形 + 方向箭头）
  topCtx.save();
  topCtx.translate(dog.x, dog.y);
  topCtx.rotate(dog.angle);

  // 狗身体
  topCtx.fillStyle = '#1a3a5a';
  topCtx.strokeStyle = '#2bd';
  topCtx.lineWidth = 2;
  topCtx.beginPath();
  topCtx.roundRect(-18, -12, 36, 24, 4);
  topCtx.fill(); topCtx.stroke();

  // 方向箭头
  topCtx.fillStyle = '#2bd';
  topCtx.beginPath();
  topCtx.moveTo(20, 0); topCtx.lineTo(12, -6); topCtx.lineTo(12, 6);
  topCtx.fill();

  // 相机
  topCtx.fillStyle = '#0af';
  topCtx.fillRect(16, -4, 8, 8);

  // 四条腿
  topCtx.fillStyle = '#2bd7';
  [[-14,-14],[-14,14],[10,-14],[10,14]].forEach(([lx,ly]) => {
    topCtx.beginPath(); topCtx.arc(lx, ly, 4, 0, Math.PI*2); topCtx.fill();
  });

  topCtx.restore();

  // 标注
  topCtx.fillStyle = '#2bd8';
  topCtx.font = '9px monospace';
  topCtx.fillText('BOTDOG', dog.x - 22, dog.y + 28);

  // 坐标
  topCtx.fillStyle = '#34567a';
  topCtx.font = '9px monospace';
  topCtx.fillText(`(${dog.x.toFixed(0)}, ${dog.y.toFixed(0)})`, dog.x - 20, dog.y + 38);

  // 当前命令覆盖
  const cmdColors = { stop:'#567', left:'#4af', right:'#4af', forward:'#4d8' };
  const cmdEmoji = { stop:'⏹', left:'◀ 左转', right:'右转 ▶', forward:'▲ 前进' };
  topCtx.fillStyle = cmdColors[lastCmd] || '#567';
  topCtx.font = 'bold 13px system-ui';
  topCtx.fillText(cmdEmoji[lastCmd] || '⏹', 8, TH - 8);
}

// ═══════════════════════════════════════════════════════════════
//  UI 更新
// ═══════════════════════════════════════════════════════════════
const STATE_IDS = ['IDLE','DETECTING','LOCKED','FOLLOWING','LOST'];
const STATE_EL  = { IDLE:'st-IDLE', DETECTING:'st-DETECTING', LOCKED:'st-LOCKED', FOLLOWING:'st-FOLLOWING', LOST:'st-LOST' };

function updateUI(result) {
  // 命令显示
  const cmdEl = document.getElementById('cmdDisplay');
  const cmdMap = { stop:'STOP', left:'◀ LEFT', right:'RIGHT ▶', forward:'▲ FWD' };
  const clsMap = { stop:'cmd-stop', left:'cmd-left', right:'cmd-right', forward:'cmd-forward' };
  cmdEl.textContent = cmdMap[result.cmd];
  cmdEl.className = clsMap[result.cmd];

  // 箭头
  ['left','right','fwd','stop'].forEach(d => document.getElementById('arr-' + d).classList.remove('active'));
  if (result.cmd === 'left')    document.getElementById('arr-left').classList.add('active');
  if (result.cmd === 'right')   document.getElementById('arr-right').classList.add('active');
  if (result.cmd === 'forward') document.getElementById('arr-fwd').classList.add('active');
  if (result.cmd === 'stop')    document.getElementById('arr-stop').classList.add('active');

  // 数据
  document.getElementById('dErrX').textContent   = result.errX.toFixed(0) + ' px';
  document.getElementById('dArea').textContent   = result.areaRatio.toFixed(3);
  document.getElementById('dAnchorY').textContent= result.anchorY.toFixed(0) + ' px';
  document.getElementById('dDebounce').textContent = (result.debounce || 0) + '/3';

  // 状态机
  STATE_IDS.forEach(s => document.getElementById(STATE_EL[s]).classList.remove('active'));
  const stateKey = trackState === 'FOLLOWING' ? 'FOLLOWING'
                  : trackState === 'LOCKED' ? 'LOCKED'
                  : trackState === 'DETECTING' ? 'DETECTING'
                  : trackState === 'LOST' ? 'LOST' : 'IDLE';
  document.getElementById(STATE_EL[stateKey]).classList.add('active');

  // 命令历史
  if (result.send) {
    lastCmd = result.cmd;
    cmdHistory.push(result.cmd);
    if (cmdHistory.length > 60) cmdHistory.shift();
    const tl = document.getElementById('timeline');
    const colorMap = { stop:'#34567a', left:'#1a448a', right:'#1a448a', forward:'#1a5a2a' };
    tl.innerHTML = cmdHistory.map(c =>
      `<div class="timeline-dot" style="background:${colorMap[c]}" title="${c}"></div>`
    ).join('');

    // 日志
    addLog(`[${trackState}] ${result.cmd.toUpperCase()} — ${result.reason}`);
  }
}

function addLog(msg) {
  const lb = document.getElementById('logBox');
  const d = document.createElement('div');
  d.textContent = msg;
  d.className = 'log-new';
  lb.appendChild(d);
  lb.scrollTop = lb.scrollHeight;
  if (lb.children.length > 30) lb.removeChild(lb.firstChild);
  setTimeout(() => d.classList.remove('log-new'), 1000);
}

// ═══════════════════════════════════════════════════════════════
//  机器狗物理移动（俯视更新）
// ═══════════════════════════════════════════════════════════════
function updateDog(cmd) {
  const speed = 3;
  const turnSpeed = 0.04;
  const prev = { x: dog.x, y: dog.y };

  if (cmd === 'forward') {
    dog.x += Math.cos(dog.angle) * speed;
    dog.y += Math.sin(dog.angle) * speed;
  } else if (cmd === 'left') {
    dog.angle -= turnSpeed;
  } else if (cmd === 'right') {
    dog.angle += turnSpeed;
  }

  // 边界
  dog.x = Math.max(20, Math.min(TW - 20, dog.x));
  dog.y = Math.max(20, Math.min(TH - 20, dog.y));

  // 轨迹点（每5帧加一个）
  if (Math.hypot(dog.x - prev.x, dog.y - prev.y) > 2) {
    dog.trail.push({ x: dog.x, y: dog.y });
    if (dog.trail.length > 200) dog.trail.shift();
  }
}

// ═══════════════════════════════════════════════════════════════
//  主循环
// ═══════════════════════════════════════════════════════════════
let animId = null;
function loop() {
  // 计算 bbox（以 person 底部中心为锚点）
  const bbox = [
    person.x - person.w / 2,
    person.y - person.h,
    person.x + person.w / 2,
    person.y
  ];

  // 目标在画面内才触发跟踪
  const inFrame = bbox[0] > -20 && bbox[2] < CW + 20 && bbox[1] > -20 && bbox[3] < CH + 20;

  if (inFrame) {
    lostCount = 0;
    hitCount = Math.min(hitCount + 1, STABLE_HITS + 5);
    if (trackState === 'IDLE') trackState = 'DETECTING';
    if (hitCount >= STABLE_HITS && trackState === 'DETECTING') trackState = 'LOCKED';
    if (trackState === 'LOCKED') trackState = 'FOLLOWING';
  } else {
    lostCount++;
    hitCount = Math.max(0, hitCount - 2);
    if (lostCount > LOST_FRAMES) { trackState = 'IDLE'; hitCount = 0; }
    else if (lostCount > 5) trackState = 'LOST';
  }

  const result = ENG.decide(bbox, CW, CH);
  updateUI(result);

  if (trackState === 'FOLLOWING') {
    updateDog(result.cmd);
  }

  drawCam();
  drawTop();
  animId = requestAnimationFrame(loop);
}

// ═══════════════════════════════════════════════════════════════
//  拖拽交互
// ═══════════════════════════════════════════════════════════════
camCvs.addEventListener('mousedown', e => {
  const r = camCvs.getBoundingClientRect();
  const mx = e.clientX - r.left, my = e.clientY - r.top;
  if (Math.abs(mx - person.x) < person.w && Math.abs(my - person.y + person.h / 2) < person.h / 2) {
    dragging = true;
    stopDemo();
  }
});
camCvs.addEventListener('mousemove', e => {
  if (!dragging) return;
  const r = camCvs.getBoundingClientRect();
  person.x = e.clientX - r.left;
  person.y = e.clientY - r.top;
});
camCvs.addEventListener('mouseup', () => dragging = false);
camCvs.addEventListener('mouseleave', () => dragging = false);

// 触摸
camCvs.addEventListener('touchstart', e => {
  e.preventDefault();
  const r = camCvs.getBoundingClientRect();
  const t = e.touches[0];
  person.x = t.clientX - r.left; person.y = t.clientY - r.top;
  dragging = true; stopDemo();
}, { passive: false });
camCvs.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!dragging) return;
  const r = camCvs.getBoundingClientRect();
  const t = e.touches[0];
  person.x = t.clientX - r.left; person.y = t.clientY - r.top;
}, { passive: false });
camCvs.addEventListener('touchend', () => dragging = false);

// ═══════════════════════════════════════════════════════════════
//  自动演示脚本
// 场景：陌生人从右侧进入 → 居中 → 靠近 → 离开
// ═══════════════════════════════════════════════════════════════
const DEMO_WAYPOINTS = [
  // [目标x, 目标y, 持续帧数, 描述]
  [CW * 0.85, CH * 0.5, 60,  '① 陌生人从右侧进入画面'],
  [CW * 0.5,  CH * 0.5, 80,  '② 目标向中央移动（机器狗开始锁定）'],
  [CW * 0.5,  CH * 0.65, 60, '③ 目标靠近（前进命令）'],
  [CW * 0.5,  CH * 0.82, 50, '④ 目标过近（纵向保护激活，停止前进）'],
  [CW * 0.25, CH * 0.5,  70, '⑤ 目标向左移（机器狗左转跟随）'],
  [CW * 0.75, CH * 0.5,  80, '⑥ 目标向右移（机器狗右转跟随）'],
  [CW * 0.5,  CH * 0.5,  60, '⑦ 目标重新居中'],
  [-0.1 * CW, CH * 0.5,  60, '⑧ 目标离开画面（进入丢失状态）'],
];

let demoScriptIdx = 0, demoFrameCount = 0;
let demoCaption = '';

function startDemo() {
  stopDemo();
  demoScriptIdx = 0; demoFrameCount = 0;
  addLog('▷ 自动演示开始');
  const speed = parseFloat(document.getElementById('speedSlider').value);
  simInterval = setInterval(() => {
    if (demoScriptIdx >= DEMO_WAYPOINTS.length) { stopDemo(); addLog('■ 演示结束'); return; }
    const [tx, ty, duration, desc] = DEMO_WAYPOINTS[demoScriptIdx];
    // 平滑插值
    person.x += (tx - person.x) * 0.06;
    person.y += (ty - person.y) * 0.06;
    if (demoFrameCount === 0) addLog('▸ ' + desc);
    demoFrameCount++;
    if (demoFrameCount >= Math.round(duration / speed)) {
      demoScriptIdx++; demoFrameCount = 0;
    }
  }, 33); // ~30fps
}

function stopDemo() {
  if (simInterval) { clearInterval(simInterval); simInterval = null; }
}

function resetSim() {
  stopDemo();
  person = { x: CW / 2, y: CH / 2, w: 60, h: 100 };
  dog = { x: TW / 2, y: TH * 0.75, angle: -Math.PI / 2, trail: [] };
  trackState = 'IDLE'; hitCount = 0; lostCount = 0; lastCmd = 'stop';
  cmdHistory = [];
  ENG.reset();
  document.getElementById('timeline').innerHTML = '';
  document.getElementById('logBox').innerHTML = '';
  addLog('↺ 已重置');
}

// ═══════════════════════════════════════════════════════════════
//  启动
// ═══════════════════════════════════════════════════════════════
resetSim();
loop();
addLog('仿真已就绪');
addLog('提示：拖动画面中的人形，或点击"自动演示"');
</script>
