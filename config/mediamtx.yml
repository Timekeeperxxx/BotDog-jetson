# MediaMTX configuration
# Docs: https://github.com/bluenviron/mediamtx

logLevel: info

# RTSP server (ingest)
rtsp: yes
rtspAddress: :8554
# avoid UDP ports that conflict with backend on 8000
# rtspTransports:
#   - tcp

# WHEP server
webrtc: yes
webrtcAddress: :8889
webrtcEncryption: false


# WHEP paths (explicit for clarity)
# 填写 OrangePi 对外可达的 IP（交换机/HM30 侧），供地面端浏览器 ICE 协商使用
webrtcAdditionalHosts:
  - 192.168.144.104

paths:
  cam:
    source: publisher
  cam2:
    source: publisher
